<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#FFF3CD"/>
    </radialGradient>
  </defs>

  <!-- Background squircle -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- 8 rays at 45° intervals -->
  <g fill="rgba(255,255,255,0.82)">
    <rect x="247" y="100" width="18" height="54" rx="9" transform="rotate(0,256,256)"/>
    <rect x="247" y="100" width="18" height="54" rx="9" transform="rotate(45,256,256)"/>
    <rect x="247" y="100" width="18" height="54" rx="9" transform="rotate(90,256,256)"/>
    <rect x="247" y="100" width="18" height="54" rx="9" transform="rotate(135,256,256)"/>
    <rect x="247" y="100" width="18" height="54" rx="9" transform="rotate(180,256,256)"/>
    <rect x="247" y="100" width="18" height="54" rx="9" transform="rotate(225,256,256)"/>
    <rect x="247" y="100" width="18" height="54" rx="9" transform="rotate(270,256,256)"/>
    <rect x="247" y="100" width="18" height="54" rx="9" transform="rotate(315,256,256)"/>
  </g>

  <!-- Sun body -->
  <circle cx="256" cy="256" r="90" fill="url(#sun)"/>
</svg>
